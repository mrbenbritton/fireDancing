<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fire Performance</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <h1 class="page-title">Performance</h1>

      <section class="carousel" aria-label="Featured performance images">
        <button class="carousel-button prev" type="button" aria-label="Previous image"></button>
        <div class="carousel-stage">
          <img class="carousel-image active" src="AGR_5794.JPG" alt="Fire performance 1" />
          <img class="carousel-image" src="AGR_5847.JPG" alt="Fire performance 2" />
          <img class="carousel-image" src="AGR_5858.JPG" alt="Fire performance 3" />
          <img class="carousel-image" src="ben%20fire%202.jpg" alt="Ben fire 2" />
          <img class="carousel-image" src="Ben%20fire.jpg" alt="Ben fire" />
          <img class="carousel-image" src="Full Moon Drumming Feb2.jpg" alt="Full Moon Drumming" />
          <img class="carousel-image" src="IMG_2805.jpg" alt="Fire performance 4" />
          <img class="carousel-image" src="IMG_2806.jpg" alt="Fire performance 5" />
          <img class="carousel-image" src="IMG_2876.jpg" alt="Fire performance 6" />
          <img class="carousel-image" src="IMG_2912.jpg" alt="Fire performance 7" />
          <img class="carousel-image" src="IMG_3066.jpg" alt="Fire performance 8" />
          <img class="carousel-image" src="IMG_3111.jpg" alt="Fire performance 9" />
          <img class="carousel-image" src="LakeBubble.jpg" alt="Lake bubble" />
          <img class="carousel-image" src="Round the bays 2020.jpg" alt="Round the bays 2020" />
        </div>
        <button class="carousel-button next" type="button" aria-label="Next image"></button>
      </section>

      <section class="link-grid" aria-label="YouTube links">
         <a class="link-card" href="https://youtu.be/doSOXJWp0j4" target="_blank" rel="noopener noreferrer" aria-label="Staff"><img src="https://img.youtube.com/vi/doSOXJWp0j4/hqdefault.jpg" alt="Staff thumbnail" /></a>
         <a class="link-card" href="https://youtu.be/dl8eCHp9eo8" target="_blank" rel="noopener noreferrer" aria-label="Double Staff"><img src="https://img.youtube.com/vi/dl8eCHp9eo8/hqdefault.jpg" alt="DoubleStaff thumbnail" /></a>
         <a class="link-card" href="https://youtu.be/KT2owc2nfdw" target="_blank" rel="noopener noreferrer" aria-label="Rope Dart"><img src="https://img.youtube.com/vi/KT2owc2nfdw/hqdefault.jpg" alt="Rope Dart thumbnail" /></a>
         <a class="link-card" href="https://youtu.be/lIAUlAU9mbY" target="_blank" rel="noopener noreferrer" aria-label="Poi"><img src="https://img.youtube.com/vi/lIAUlAU9mbY/hqdefault.jpg" alt="Poi thumbnail" /></a>
        
         <a class="link-card" href="https://youtu.be/hCl3qdcUYMo" target="_blank" rel="noopener noreferrer" aria-label="Unicycle"><img src="https://img.youtube.com/vi/hCl3qdcUYMo/hqdefault.jpg" alt="Unicycle thumbnail" /></a>
      </section>
    </main>
    <script>
      const slides = Array.from(document.querySelectorAll('.carousel-image'));
      const prevButton = document.querySelector('.carousel-button.prev');
      const nextButton = document.querySelector('.carousel-button.next');
      let currentIndex = 0;

      function showSlide(index) {
        slides.forEach((slide, slideIndex) => {
          slide.classList.toggle('active', slideIndex === index);
        });
      }

      function nextSlide() {
        currentIndex = (currentIndex + 1) % slides.length;
        showSlide(currentIndex);
      }

      function prevSlide() {
        currentIndex = (currentIndex - 1 + slides.length) % slides.length;
        showSlide(currentIndex);
      }

      prevButton.addEventListener('click', prevSlide);
      nextButton.addEventListener('click', nextSlide);
      setInterval(nextSlide, 5000);
    </script>
  </body>
</html>
