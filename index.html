<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fire Performance</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <h1 class="page-title">Performance</h1>

      <section class="carousel" aria-label="Featured performance images">
        <button class="carousel-button prev" type="button" aria-label="Previous image"></button>
        <div class="carousel-stage">
          <img class="carousel-image active" src="AGR_5794.JPG" alt="Fire performance 1" />
          <img class="carousel-image" src="AGR_5847.JPG" alt="Fire performance 2" />
          <img class="carousel-image" src="AGR_5858.JPG" alt="Fire performance 3" />
          <img class="carousel-image" src="ben%20fire%202.jpg" alt="Ben fire 2" />
          <img class="carousel-image" src="Ben%20fire.jpg" alt="Ben fire" />
          <img class="carousel-image" src="Full Moon Drumming Feb2.jpg" alt="Full Moon Drumming" />
          <img class="carousel-image" src="IMG_2805.jpg" alt="Fire performance 4" />
          <img class="carousel-image" src="IMG_2806.jpg" alt="Fire performance 5" />
          <img class="carousel-image" src="IMG_2876.jpg" alt="Fire performance 6" />
          <img class="carousel-image" src="IMG_2912.jpg" alt="Fire performance 7" />
          <img class="carousel-image" src="IMG_3066.jpg" alt="Fire performance 8" />
          <img class="carousel-image" src="IMG_3111.jpg" alt="Fire performance 9" />
          <img class="carousel-image" src="Round the bays 2020.jpg" alt="Round the bays 2020" />
        </div>
        <button class="carousel-button next" type="button" aria-label="Next image"></button>
      </section>

      <section class="link-grid" aria-label="YouTube links">
        <a class="link-card" href="https://youtu.be/hM9cW3-rRlg" target="_blank" rel="noopener noreferrer" aria-label="Video one"><img src="https://img.youtube.com/vi/hM9cW3-rRlg/hqdefault.jpg" alt="Video one thumbnail" /></a>
        <a class="link-card" href="https://youtu.be/uV2iwO38jkA" target="_blank" rel="noopener noreferrer" aria-label="Video two"><img src="https://img.youtube.com/vi/uV2iwO38jkA/hqdefault.jpg" alt="Video two thumbnail" /></a>
        <a class="link-card" href="https://youtu.be/EClaIAxPp08" target="_blank" rel="noopener noreferrer" aria-label="Video three"><img src="https://img.youtube.com/vi/EClaIAxPp08/hqdefault.jpg" alt="Video three thumbnail" /></a>
        <a class="link-card" href="https://youtu.be/LHP9h9FmVEk" target="_blank" rel="noopener noreferrer" aria-label="Video four"><img src="https://img.youtube.com/vi/LHP9h9FmVEk/hqdefault.jpg" alt="Video four thumbnail" /></a>
        <a class="link-card" href="https://youtu.be/I4p5wpPFGg4" target="_blank" rel="noopener noreferrer" aria-label="Video five"><img src="https://img.youtube.com/vi/I4p5wpPFGg4/hqdefault.jpg" alt="Video five thumbnail" /></a>
        <a class="link-card" href="https://youtu.be/PnjW6zCmWsU" target="_blank" rel="noopener noreferrer" aria-label="Video six"><img src="https://img.youtube.com/vi/PnjW6zCmWsU/hqdefault.jpg" alt="Video six thumbnail" /></a>
        <a class="link-card" href="https://youtu.be/hoNdNaK5lU0" target="_blank" rel="noopener noreferrer" aria-label="Video seven"><img src="https://img.youtube.com/vi/hoNdNaK5lU0/hqdefault.jpg" alt="Video seven thumbnail" /></a>
        <a class="link-card" href="https://youtube.com/shorts/yEFst78dw7E" target="_blank" rel="noopener noreferrer" aria-label="Video eight"><img src="https://img.youtube.com/vi/yEFst78dw7E/hqdefault.jpg" alt="Video eight thumbnail" /></a>
        <a class="link-card" href="https://youtu.be/Suog08daq_k" target="_blank" rel="noopener noreferrer" aria-label="Video nine"><img src="https://img.youtube.com/vi/Suog08daq_k/hqdefault.jpg" alt="Video nine thumbnail" /></a>
      </section>
    </main>
    <script>
      const slides = Array.from(document.querySelectorAll('.carousel-image'));
      const prevButton = document.querySelector('.carousel-button.prev');
      const nextButton = document.querySelector('.carousel-button.next');
      let currentIndex = 0;

      function showSlide(index) {
        slides.forEach((slide, slideIndex) => {
          slide.classList.toggle('active', slideIndex === index);
        });
      }

      function nextSlide() {
        currentIndex = (currentIndex + 1) % slides.length;
        showSlide(currentIndex);
      }

      function prevSlide() {
        currentIndex = (currentIndex - 1 + slides.length) % slides.length;
        showSlide(currentIndex);
      }

      prevButton.addEventListener('click', prevSlide);
      nextButton.addEventListener('click', nextSlide);
      setInterval(nextSlide, 5000);
    </script>
  </body>
</html>
